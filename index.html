<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>六级高频词汇选择器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">CET-6 Word Trainer</p>
        <h1>六级高频词汇选择器</h1>
      </div>
      <div class="stats" aria-label="答题统计">
        <div>
          <span id="totalCount">0</span>
          <small>总题数</small>
        </div>
        <div>
          <span id="correctCount">0</span>
          <small>正确</small>
        </div>
        <div>
          <span id="wrongCount">0</span>
          <small>错误</small>
        </div>
      </div>
    </section>

    <section class="practice-panel" aria-label="练习区">
      <div class="question-card">
        <div class="question-topline">
          <span id="wordIndex">第 1 题</span>
        </div>
        <h2 id="questionText">正在加载题目...</h2>

        <div id="choiceArea" class="choice-grid" aria-label="中文释义选项"></div>

        <p id="feedback" class="feedback" aria-live="polite"></p>

        <div class="actions">
          <button id="nextQuestion" type="button">下一题</button>
          <button id="resetPractice" class="secondary" type="button">重新开始</button>
        </div>
      </div>
    </section>

    <section class="wrong-book" aria-label="错题本">
      <div class="section-title">
        <h2>错题本</h2>
        <span id="wrongBookCount">0 个</span>
      </div>
      <ul id="wrongBookList">
        <li class="empty-state">答错的词会自动记录在这里。</li>
      </ul>
    </section>
  </main>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
